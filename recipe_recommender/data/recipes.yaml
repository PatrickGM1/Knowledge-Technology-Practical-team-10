  - name: "Crème Brûlée"
    cuisine: "French"
    diet: "vegetarian"
    dietary_restrictions: []
    cooking_time_minutes: 70
    skill_level: "medium"
    cooking_methods: ["oven"]
    budget_category: "moderate"
    meal_type: "dinner"
    servings: 6
    prep_time_minutes: 15
    cost: 4.50
    tags: ["french", "dessert", "classic", "elegant"]
    ingredients:
      - name: "egg yolks"
        quantity: 6
        unit: "pieces"
        category: "protein"
        allergens: ["eggs"]
      - name: "heavy cream"
        quantity: 500
        unit: "ml"
        category: "dairy"
        allergens: ["dairy"]
      - name: "sugar"
        quantity: 100
        unit: "g"
        category: "other"
      - name: "vanilla extract"
        quantity: 1
        unit: "tsp"
        category: "spice"
    equipment:
      - "bowl"
      - "whisk"
      - "ramekins"
      - "oven"
      - "baking tray"
    instructions:
      - "In a bowl, whisk egg yolks and sugar until well combined"
      - "Add the heavy cream and vanilla extract to the mixture"
      - "Pour mixture into individual ramekins"
      - "Place ramekins in a baking tray filled with water (bain-marie)"
      - "Bake in oven at 120°C (no fan) for 1 hour to 1 hour 10 minutes"
      - "Leave in oven to cool gradually"
      - "Before serving, sprinkle sugar on top and caramelize with a torch"
    nutritional_info:
      calories: 320
      protein: 6
      carbohydrates: 28
      fat: 21
      fiber: 0
      sodium: 50

  - name: "Clarified Butter Hollandaise"
    cuisine: "French"
    diet: "vegetarian"
    dietary_restrictions: []
    cooking_time_minutes: 15
    skill_level: "medium"
    cooking_methods: ["pan"]
    budget_category: "moderate"
    meal_type: "lunch"
    servings: 4
    prep_time_minutes: 15
    cost: 3.00
    tags: ["sauce", "french", "classic"]
    ingredients:
      - name: "butter"
        quantity: 200
        unit: "g"
        category: "dairy"
        allergens: ["dairy"]
      - name: "egg yolk"
        quantity: 3
        unit: "pieces"
        category: "protein"
        allergens: ["eggs"]
      - name: "lemon juice"
        quantity: 1
        unit: "tbsp"
        category: "other"
      - name: "white wine vinegar"
        quantity: 1
        unit: "tbsp"
        category: "other"
      - name: "salt"
        quantity: 0.5
        unit: "tsp"
        category: "spice"
      - name: "pepper"
        quantity: 0.25
        unit: "tsp"
        category: "spice"
    equipment:
      - "sauce pan"
      - "bowl"
      - "whisk"
      - "sieve"
    instructions:
      - "Melt the butter in a pan"
      - "Skim the foam from the top with a spoon"
      - "Filter the melted butter through a sieve to get clear golden liquid"
      - "Discard impurities that settled on the bottom"
      - "In a sauce pan with boiling water, place a bowl on top"
      - "Add egg yolks, lemon juice, and vinegar to the bowl"
      - "Whisk while slowly adding the clarified butter"
      - "Turn heat on and off to prevent eggs from overcooking"
      - "Continue whisking until sauce is thick and emulsified"
    nutritional_info:
      calories: 280
      protein: 3
      carbohydrates: 2
      fat: 30
      fiber: 0
      sodium: 180

